<form class="centered">
  <h1>Login</h1>
  <p>
    <mat-form-field appearance="fill">
      <mat-label>E-mail</mat-label>
      <input matInput type="email" />
    </mat-form-field>
  </p>
  <p>
    <mat-form-field appearance="fill">
      <mat-label>Password</mat-label>
      <input matInput type="password" />
    </mat-form-field>
  </p>
  <button mat-flat-button color="primary" class="button">Login</button>
</form>
